<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzSMdTO_vFHOaI3PLMm6WU2ca2GaBZwnA",
  authDomain: "te-logistics-movers.firebaseapp.com",
  projectId: "te-logistics-movers",
  storageBucket: "te-logistics-movers.firebasestorage.app",
  messagingSenderId: "1076872105452",
  appId: "1:1076872105452:web:919c3f363dfebd896c84c9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.track = async function(){

let id = document.getElementById("trackInput").value.trim();

// If nothing typed → show nothing
if(id === ""){
document.getElementById("result").innerHTML = "";
return;
}

let snap = await get(ref(db,"shipments/"+id));

if(!snap.exists()){
document.getElementById("result").innerHTML = "Tracking not found";
return;
}

let r = snap.val();
window.currentShipment = r;

let steps = [
"Shipment Created",
"Processing",
"In Transit",
"Out for Delivery",
"Delivered"
];

// Only insert Pending Insurance if selected
if(r.status === 2){
steps.splice(2,0,"Pending Insurance");
}

let html = "<h2>"+r.receiver+"</h2>";
html += "Current Location: "+r.location+"<br>";
html += "Address: "+r.address+", "+r.city+", "+r.state+", "+r.zip+"<br>";
html += "Updated: "+r.date+" "+r.time+"<br><br>";

// ITEMS ONLY (no amount)
if(r.items){
html += "<strong>Items:</strong><br>"+r.items+"<br><br>";
}

html += "<div class='timeline'>";

steps.forEach((s,i)=>{

if(s === "Pending Insurance"){
html += "<div style='color:#ffd000;font-weight:600;'>⚠ "+s+"</div>";
}
else{
html += "<div class='"+(i <= r.status ? "active" : "")+"'>✔ "+s+"</div>";
}

});

html += "</div>";
html += "<br><button onclick='downloadInvoice(\""+id+"\")'>Print Invoice</button>";

document.getElementById("result").innerHTML = html;
}

window.downloadInvoice = function(id){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();
const r = window.currentShipment;

doc.setFontSize(18);
doc.text("TE LOGISTICS MOVERS",20,20);
doc.setFontSize(12);
doc.text("Shipment Invoice",20,30);
doc.line(20,35,190,35);

doc.text("Tracking ID: "+id,20,50);
doc.text("Receiver: "+r.receiver,20,60);
doc.text("Location: "+r.location,20,70);

if(r.items){
doc.text("Items:",20,85);
doc.text(r.items,20,95);
}

doc.save("Invoice_"+id+".pdf");
}

</script>
