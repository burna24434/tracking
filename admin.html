<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secure Admin | TE Logistics Movers</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#0c1020;color:#fff;padding:40px}
.card{max-width:950px;margin:auto;background:#121a33;padding:30px;border-radius:15px;margin-bottom:30px}
input,select,textarea{width:100%;padding:14px;margin-top:12px;border:none;border-radius:8px}
button{width:100%;padding:14px;margin-top:15px;background:#0066ff;border:none;color:#fff;border-radius:8px;cursor:pointer}
table{width:100%;margin-top:20px;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid #2c355a;text-align:left}
.logo{display:block;margin:auto;width:180px;margin-bottom:20px}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<div class="card" id="login">
<h2>Secure Admin Login</h2>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="card" id="panel" style="display:none">
<h2>Create / Edit Shipment</h2>

<input id="trackId" placeholder="Tracking ID (leave blank to auto generate)">
<input id="receiver" placeholder="Receiver">
<input id="location" placeholder="Current location">
<input id="address" placeholder="Address">
<input id="city" placeholder="City">
<input id="state" placeholder="State">
<input id="zip" placeholder="Zip">
<input id="date" placeholder="Date">
<input id="time" placeholder="Time">
<textarea id="items" placeholder="Items in shipment"></textarea>
<input id="amount" placeholder="Total Amount (USD)">

<select id="status">
<option value="0">Shipment Created</option>
<option value="1">Processing</option>
<option value="2">Pending Insurance</option>
<option value="3">In Transit</option>
<option value="4">Out for Delivery</option>
<option value="5">Delivered</option>
</select>

<button onclick="saveShipment()">Save Shipment</button>
<h3 id="msg"></h3>
</div>

<div class="card" id="dashboard" style="display:none">
<h2>Shipment Dashboard</h2>
<table id="shipmentTable">
<thead>
<tr>
<th>Tracking</th>
<th>Receiver</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAzSMdTO_vFHOaI3PLMm6WU2ca2GaBZwnA",
authDomain: "te-logistics-movers.firebaseapp.com",
projectId: "te-logistics-movers",
storageBucket: "te-logistics-movers.firebasestorage.app",
messagingSenderId: "1076872105452",
appId: "1:1076872105452:web:919c3f363dfebd896c84c9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.login = function(){
if(pass.value === "admin123"){
login.style.display="none";
panel.style.display="block";
dashboard.style.display="block";
loadShipments();
}else{
alert("Incorrect password");
}
}

function generateID(){
return "TL"+Math.floor(Math.random()*999999999);
}

window.saveShipment = async function(){
let id = trackId.value.trim();
if(!id) id = generateID();

const shipment = {
receiver: receiver.value,
location: location.value,
address: address.value,
city: city.value,
state: state.value,
zip: zip.value,
date: date.value,
time: time.value,
items: items.value,
amount: amount.value,
status: parseInt(status.value)
};

await set(ref(db,"shipments/"+id), shipment);

msg.innerText="Saved Tracking: "+id;
loadShipments();
}

function loadShipments(){
onValue(ref(db,"shipments"), snapshot=>{
let tbody=document.querySelector("#shipmentTable tbody");
tbody.innerHTML="";
snapshot.forEach(child=>{
let s=child.val();
let statusText=["Shipment Created","Processing","Pending Insurance","In Transit","Out for Delivery","Delivered"][s.status];

let tr=document.createElement("tr");
tr.innerHTML=`
<td>${child.key}</td>
<td>${s.receiver}</td>
<td>${statusText}</td>
<td>
<button onclick="editShipment('${child.key}')">Edit</button>
<button onclick='generateInvoice("${child.key}", ${JSON.stringify(s)})'>Invoice</button>
</td>
`;
tbody.appendChild(tr);
});
});
}

window.editShipment = async function(id){
let snap=await get(ref(db,"shipments/"+id));
if(!snap.exists()) return;
let r=snap.val();
trackId.value=id;
receiver.value=r.receiver;
location.value=r.location;
address.value=r.address;
city.value=r.city;
state.value=r.state;
zip.value=r.zip;
date.value=r.date;
time.value=r.time;
items.value=r.items;
amount.value=r.amount;
status.value=r.status;
window.scrollTo(0,0);
}

window.generateInvoice = function(id, shipment){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

const logo = new Image();
logo.src = "logo.png";

logo.onload = function(){

doc.addImage(logo,"PNG",40,10,130,50);

doc.setFontSize(20);
doc.text("INVOICE",105,75,{align:"center"});

doc.setFontSize(12);
doc.text("Invoice No: INV-"+id,20,95);
doc.text("Tracking No: "+id,20,105);
doc.text("Date: "+new Date().toLocaleDateString(),20,115);

doc.text("Bill To:",130,95);
doc.text(shipment.receiver,130,105);
doc.text(shipment.address+", "+shipment.city,130,115);
doc.text(shipment.state+" "+shipment.zip,130,125);

doc.line(15,135,195,135);

doc.text("Description",20,150);
doc.text("Amount",160,150);

doc.line(15,155,195,155);

doc.text(shipment.items,20,170);
doc.text("$"+shipment.amount,160,170);

doc.line(15,180,195,180);

doc.setFontSize(14);
doc.text("Total: $"+shipment.amount,150,195);

doc.setFontSize(10);
doc.text("Thank you for choosing TE Logistics Movers.",105,215,{align:"center"});

doc.save("Invoice_"+id+".pdf");
}
}
</script>

</body>
</html>
