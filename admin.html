<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secure Admin | TE Logistics Movers</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins;background:#0c1020;color:#fff;padding:40px}
.card{max-width:700px;margin:auto;background:#121a33;padding:30px;border-radius:15px}
input,select,textarea{width:100%;padding:14px;margin-top:12px;border:none;border-radius:8px}
button{width:100%;padding:14px;margin-top:15px;background:#0066ff;border:none;color:#fff;border-radius:8px}
</style>
</head>

<body>

<div class="card" id="login">
<h2>Secure Admin Login</h2>
<input id="pass" placeholder="Password">
<button id="loginBtn">Login</button>
</div>

<div class="card" id="panel" style="display:none">
<h2>Create / Edit Shipment</h2>

<input id="trackId" placeholder="Tracking ID (leave blank to generate)">
<input id="receiver" placeholder="Receiver">
<input id="email" placeholder="Customer Email">
<input id="location" placeholder="Current location">
<input id="address" placeholder="Address">
<input id="city" placeholder="City">
<input id="state" placeholder="State">
<input id="zip" placeholder="Zip">
<textarea id="items" placeholder="Items (Example: 1x Guitar, 2x Speaker)"></textarea>
<input id="amount" placeholder="Total Amount ($)">
<input id="date" placeholder="Date">
<input id="time" placeholder="Time">

<select id="status">
<option>Shipment Created</option>
<option>Processing</option>
<option>Pending Insurance</option>
<option>In Transit</option>
<option>Out for Delivery</option>
<option>Delivered</option>
</select>

<button id="saveBtn">Save Shipment</button>
<h3 id="msg"></h3>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";
import emailjs from "https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js";

emailjs.init("BLZz7i0IR9WgT0NYW");

const firebaseConfig = {
  apiKey: "AIzaSyAzSMdTO_vFHOaI3PLMm6WU2ca2GaBZwnA",
  authDomain: "te-logistics-movers.firebaseapp.com",
  projectId: "te-logistics-movers",
  storageBucket: "te-logistics-movers.firebasestorage.app",
  messagingSenderId: "1076872105452",
  appId: "1:1076872105452:web:919c3f363dfebd896c84c9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

document.getElementById('loginBtn').onclick = () => {
  if(document.getElementById('pass').value === 'admin123'){
    login.style.display='none';
    panel.style.display='block';
  } else {
    alert("Incorrect password");
  }
};

document.getElementById('saveBtn').onclick = async () => {

  let id = document.getElementById('trackId').value.trim();
  if(!id) id = "TL" + Math.floor(Math.random()*999999999);

  const invoiceId = "INV" + Math.floor(Math.random()*999999999);

  const shipment = {
    receiver: receiver.value,
    email: email.value,
    location: location.value,
    address: address.value,
    city: city.value,
    state: state.value,
    zip: zip.value,
    items: items.value,
    amount: amount.value,
    status: status.selectedIndex,
    date: date.value,
    time: time.value
  };

  await set(ref(db,'shipments/'+id), shipment);

  emailjs.send("service_y96zroe","template_ue23cwj",{
    invoice_id: invoiceId,
    tracking_id: id,
    date: shipment.date,
    receiver: shipment.receiver,
    address: shipment.address,
    city: shipment.city,
    state: shipment.state,
    zip: shipment.zip,
    to_email: shipment.email,
    location: shipment.location,
    status: document.getElementById("status").options[shipment.status].text,
    items: shipment.items,
    amount: shipment.amount
  });

  msg.innerText = "Shipment Saved & Invoice Sent | Tracking: " + id;
};
</script>

</body>
</html>
