<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secure Admin | TE Logistics Movers</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins;background:#0c1020;color:#fff;padding:40px}
.card{max-width:900px;margin:auto;background:#121a33;padding:30px;border-radius:15px;margin-bottom:40px}
input,select,textarea{width:100%;padding:14px;margin-top:12px;border:none;border-radius:8px}
button{width:100%;padding:14px;margin-top:15px;background:#0066ff;border:none;color:#fff;border-radius:8px;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:20px}
td{padding:10px;border-bottom:1px solid #333}
</style>
</head>
<body>

<div class="card" id="login">
<div style="text-align:center;margin-bottom:20px;">
<img src="logo.png" style="height:70px;">
</div>
<h2>Secure Admin Login</h2>
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="card" id="panel" style="display:none">

<div style="text-align:center;margin-bottom:20px;">
<img src="logo.png" style="height:70px;">
</div>

<h2>Create / Edit Shipment</h2>

<input id="trackId" placeholder="Tracking ID (leave blank to generate)">
<input id="receiver" placeholder="Receiver">
<input id="email" placeholder="Customer Email">
<input id="location" placeholder="Current location">
<input id="address" placeholder="Address">
<input id="city" placeholder="City">
<input id="state" placeholder="State">
<input id="zip" placeholder="Zip">
<textarea id="items" placeholder="Items (Example: 1x Laptop, 2x Phone)"></textarea>
<input id="amount" placeholder="Total Amount ($)">
<input id="date" placeholder="Date">
<input id="time" placeholder="Time">

<select id="status">
<option>Shipment Created</option>
<option>Processing</option>
<option>Pending Insurance</option>
<option>In Transit</option>
<option>Out for Delivery</option>
<option>Delivered</option>
</select>

<button onclick="saveShipment()">Save Shipment</button>
<h3 id="msg"></h3>

<hr style="margin:40px 0;">

<h2>Shipment Dashboard</h2>
<button onclick="loadShipments()">Refresh List</button>
<div id="shipmentList"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzSMdTO_vFHOaI3PLMm6WU2ca2GaBZwnA",
  authDomain: "te-logistics-movers.firebaseapp.com",
  projectId: "te-logistics-movers",
  storageBucket: "te-logistics-movers.firebasestorage.app",
  messagingSenderId: "1076872105452",
  appId: "1:1076872105452:web:919c3f363dfebd896c84c9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.login = function(){
if(pass.value === "admin123"){
login.style.display="none";
panel.style.display="block";
}else{
alert("Incorrect Password");
}
}

window.saveShipment = async function(){

let id = trackId.value.trim();
if(!id) id = "TL"+Math.floor(Math.random()*999999999);

const snapshot = await get(ref(db,'shipments/'+id));
let history = [];

if(snapshot.exists()){
history = snapshot.val().history || [];
}

history.push({
status: status.options[status.selectedIndex].text,
date: date.value,
time: time.value
});

await set(ref(db,'shipments/'+id),{
receiver: receiver.value,
email: email.value,
location: location.value,
address: address.value,
city: city.value,
state: state.value,
zip: zip.value,
items: items.value,
amount: amount.value,
status: status.selectedIndex,
date: date.value,
time: time.value,
history: history
});

msg.innerText = "Saved: "+id;
loadShipments();
}

window.loadShipments = async function(){

const snapshot = await get(ref(db,'shipments'));
if(!snapshot.exists()){
shipmentList.innerHTML="No shipments yet.";
return;
}

let html="<table>";
snapshot.forEach(child=>{
const s=child.val();
const id=child.key;

html+=`
<tr>
<td>${id}</td>
<td>${s.receiver}</td>
<td>${s.location}</td>
<td>
<select onchange="updateStatus('${id}',this.value)">
<option value="0" ${s.status==0?'selected':''}>Shipment Created</option>
<option value="1" ${s.status==1?'selected':''}>Processing</option>
<option value="2" ${s.status==2?'selected':''}>Pending Insurance</option>
<option value="3" ${s.status==3?'selected':''}>In Transit</option>
<option value="4" ${s.status==4?'selected':''}>Out for Delivery</option>
<option value="5" ${s.status==5?'selected':''}>Delivered</option>
</select>
</td>
</tr>`;
});
html+="</table>";
shipmentList.innerHTML=html;
}

window.updateStatus = async function(id,newStatus){
const snapshot = await get(ref(db,'shipments/'+id));
if(!snapshot.exists()) return;

let s = snapshot.val();
s.status = parseInt(newStatus);

await set(ref(db,'shipments/'+id),s);
alert("Status Updated");
loadShipments();
}

</script>
</body>
</html>
